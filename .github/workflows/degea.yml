name: ASA

on:
  schedule:
    - cron: "*/9 * * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Brave Browser
        shell: bash
        run: |
          echo "Installing Brave Browser..."
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https curl

          curl -fsSL https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg \
            | sudo tee /usr/share/keyrings/brave-browser-archive-keyring.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
            https://brave-browser-apt-release.s3.brave.com/ stable main" \
            | sudo tee /etc/apt/sources.list.d/brave-browser-release.list

          sudo apt-get update
          sudo apt-get install -y brave-browser

      - name: Install Cloudflare WARP
        shell: bash
        run: |
          echo "Installing Cloudflare WARP..."
          sudo apt-get update -y
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor \
            --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cloudflare-warp

          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp+doh
          sudo warp-cli --accept-tos connect
          sleep 5

      - name: Verify WARP connection
        shell: bash
        run: |
          echo "Verifying WARP status..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on"

      - name: Configure locale
        shell: bash
        run: |
          sudo apt-get install -y tzdata locales
          sudo locale-gen en_US.UTF-8
          sudo localectl set-locale LANG="en_US.UTF-8"
          export LANG="en_US.UTF-8"
          sudo update-locale

          locale -a
          locale
          locale -c -k LC_NUMERIC
          localectl status

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install --upgrade seleniumbase pyautogui pymongo python-xlib

      - name: Install ChromeDriver
        run: seleniumbase install chromedriver

      - name: Run para.py
        run: |
          python para.py --brave --incognito --do-not-track --xvfb --screenshot

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: seleniumbase-screenshots
          path: ./latest_logs/
